metadata:
  sso:
    enabled: true
    fields:
      - name: authenticated
        type: boolean
      - name: session_id
        type: String
  roles:
    enabled: true
    fields:
      - name: role_name
        type: String
      - name: role_level
        type: int
  user:
    enabled: true
    fields:
      - name: user_id
        type: String
      - name: clearance_level
        type: int
  location:
    enabled: true
    fields:
      - name: location_id
        type: String
      - name: location_name
        type: String
      - name: longitude
        type: float
      - name: latitude
        type: float
