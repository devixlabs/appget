metadata:
  # ─── Identity & Authentication ───
  sso:
    enabled: true
    description: "Single sign-on session state"
    fields:
      - name: authenticated
        type: boolean
      - name: session_id
        type: String
      - name: provider
        type: String

  user:
    enabled: true
    description: "Authenticated user identity"
    fields:
      - name: user_id
        type: String
      - name: email
        type: String
      - name: username
        type: String

  oauth:
    enabled: true
    description: "OAuth 2.0 token context"
    fields:
      - name: access_token
        type: String
      - name: scope
        type: String
      - name: expires_in
        type: int
      - name: provider
        type: String

  jwt:
    enabled: false
    description: "JWT token claims"
    fields:
      - name: subject
        type: String
      - name: issuer
        type: String
      - name: audience
        type: String
      - name: expires_at
        type: int

  mfa:
    enabled: false
    description: "Multi-factor authentication state"
    fields:
      - name: verified
        type: boolean
      - name: method
        type: String

  # ─── Authorization ───
  roles:
    enabled: true
    description: "Role-based access control"
    fields:
      - name: role_name
        type: String
      - name: role_level
        type: int
      - name: is_admin
        type: boolean

  permissions:
    enabled: false
    description: "Fine-grained permission checks"
    fields:
      - name: permission_name
        type: String
      - name: resource_type
        type: String
      - name: can_read
        type: boolean
      - name: can_write
        type: boolean

  # ─── API Management ───
  api:
    enabled: true
    description: "API key authentication and rate limiting"
    fields:
      - name: api_key
        type: String
      - name: rate_limit_tier
        type: int
      - name: is_active
        type: boolean

  # ─── Multi-tenancy ───
  tenant:
    enabled: false
    description: "Multi-tenant isolation context"
    fields:
      - name: tenant_id
        type: String
      - name: tenant_name
        type: String
      - name: plan
        type: String
      - name: is_active
        type: boolean

  # ─── Commerce ───
  billing:
    enabled: false
    description: "Billing and subscription context"
    fields:
      - name: customer_id
        type: String
      - name: plan
        type: String
      - name: is_active
        type: boolean
      - name: billing_cycle
        type: String

  payments:
    enabled: false
    description: "Payment processing context"
    fields:
      - name: payment_method_id
        type: String
      - name: provider
        type: String
      - name: currency
        type: String
      - name: is_verified
        type: boolean

  invoice:
    enabled: false
    description: "Invoice and billing records context"
    fields:
      - name: invoice_id
        type: String
      - name: status
        type: String
      - name: amount
        type: int
      - name: is_paid
        type: boolean

  # ─── Compliance & Observability ───
  audit:
    enabled: false
    description: "Request audit trail"
    fields:
      - name: request_id
        type: String
      - name: source_ip
        type: String
      - name: user_agent
        type: String

  geo:
    enabled: false
    description: "Geolocation context"
    fields:
      - name: country
        type: String
      - name: region
        type: String
      - name: timezone
        type: String

  # ─── Custom Categories ───
  # Add your own categories below using the same format.
  # Example:
  #
  # bitcoin:
  #   enabled: true
  #   description: "Bitcoin node and wallet context"
  #   fields:
  #     - name: address
  #       type: String
  #     - name: wallet
  #       type: String
  #     - name: node
  #       type: String
  #     - name: port
  #       type: int
